    async function createSpotifyPlaylist(token, userId, name, description, trackUris) {
      let currentToken = token;

      // Use POST /me/playlists (Feb 2026 migration: /users/{id}/playlists was removed)
      let playlistResp = await fetch(`https://api.spotify.com/v1/me/playlists`, {
        method: "POST",
        headers: {
          Authorization: `Bearer ${currentToken}`,
          "Content-Type": "application/json",
        },
        body: JSON.stringify({
          name: name,
          description: description,
          public: false,
        }),
      });

      // If 401, try refreshing the token
      if (playlistResp.status === 401) {
        const refreshToken = localStorage.getItem("spotifyRefreshToken");
        if (refreshToken) {
          currentToken = await refreshSpotifyToken(refreshToken);
          playlistResp = await fetch(`https://api.spotify.com/v1/me/playlists`, {
            method: "POST",
            headers: {
              Authorization: `Bearer ${currentToken}`,
              "Content-Type": "application/json",
            },
            body: JSON.stringify({
              name: name,
              description: description,
              public: false,
            }),
          });
        }
      }

      if (!playlistResp.ok) {
        const errData = await playlistResp.json().catch(() => ({}));
        const errMsg = errData?.error?.message || playlistResp.statusText || "Unknown error";
        if (playlistResp.status === 403) {
          throw new Error(`Spotify denied access (403). Try disconnecting and reconnecting Spotify — click the Disconnect button, then Connect again.`);
        }
        throw new Error(`Playlist creation failed (${playlistResp.status}): ${errMsg}`);
      }
      const playlist = await playlistResp.json();

      // Add tracks (filter out any invalid URIs)
      const validUris = trackUris.filter(uri => uri && uri.startsWith("spotify:track:") && !uri.includes(":mock"));
      if (validUris.length === 0) {
        throw new Error("No valid Spotify tracks to add. Try regenerating the playlist.");
      }

      // Use POST /playlists/{id}/items (Feb 2026 migration: /tracks was renamed to /items)
      const addTracksResp = await fetch(`https://api.spotify.com/v1/playlists/${playlist.id}/items`, {
        method: "POST",
        headers: {
          Authorization: `Bearer ${currentToken}`,
          "Content-Type": "application/json",
        },
        body: JSON.stringify({ uris: validUris }),
      });

      if (!addTracksResp.ok) {
        const errData = await addTracksResp.json().catch(() => ({}));
        throw new Error(`Failed to add tracks: ${errData?.error?.message || addTracksResp.statusText}`);
      }
      return playlist;
    }

    // ============ SPARKLINE SVG ============
    function ElevationSparkline({ profile, width = 240, height = 30 }) {
      if (!profile || profile.length < 2) return null;

      const minElev = Math.min(...profile);
      const maxElev = Math.max(...profile);
      const elevRange = maxElev - minElev || 1;

      const points = profile.map((elev, i) => {
        const x = (i / (profile.length - 1)) * width;
        const y = height - ((elev - minElev) / elevRange) * height;
        return [x, y];
      });

      const pathData = points.map((p, i) => `${i === 0 ? "M" : "L"}${p[0]} ${p[1]}`).join(" ");

      return (
        <svg width={width} height={height} viewBox={`0 0 ${width} ${height}`} className="trail-sparkline">
          <defs>
            <linearGradient id="sparklineFill" x1="0%" y1="0%" x2="0%" y2="100%">
              <stop offset="0%" stopColor="rgba(26, 158, 143, 0.25)" />
              <stop offset="100%" stopColor="rgba(201, 58, 30, 0.08)" />
            </linearGradient>
          </defs>
          <path
            d={`${pathData} L${points[points.length - 1][0]} ${height} L0 ${height} Z`}
            fill="url(#sparklineFill)"
            stroke="url(#sparklineFill)"
            strokeWidth="1.5"
          />
          <path d={pathData} fill="none" stroke="rgba(26, 158, 143, 0.7)" strokeWidth="2" />
        </svg>
      );
    }

    // ============ ELEVATION CHART ============
    function ElevationChart({ profile, segments }) {
      if (!profile || profile.length < 2) return null;

      const width = 800;
      const height = 250;
      const padding = { top: 20, right: 20, bottom: 40, left: 40 };

      const minElev = Math.min(...profile);
      const maxElev = Math.max(...profile);
      const elevRange = maxElev - minElev || 1;

      const chartWidth = width - padding.left - padding.right;
      const chartHeight = height - padding.top - padding.bottom;

      const points = profile.map((elev, i) => {
        const x = padding.left + (i / (profile.length - 1)) * chartWidth;
        const y = padding.top + chartHeight - ((elev - minElev) / elevRange) * chartHeight;
        return [x, y];
      });

      const pathData = points.map((p, i) => `${i === 0 ? "M" : "L"}${p[0]} ${p[1]}`).join(" ");

      const terrainSegments = segments.map((seg, idx) => {
        const startX = padding.left + (seg.startIdx / (profile.length - 1)) * chartWidth;
        const endX = padding.left + (seg.endIdx / (profile.length - 1)) * chartWidth;
        const color =
          seg.gradient > 0.05
            ? "rgba(201, 58, 30, 0.12)"
            : seg.gradient < -0.05
              ? "rgba(26, 158, 143, 0.12)"
              : "rgba(75, 94, 122, 0.08)";

        return (
          <rect
            key={idx}
            x={startX}
            y={padding.top}
            width={endX - startX + 1}
            height={chartHeight}
            fill={color}
          />
        );
      });

      return (
        <div className="elevation-chart">
          <div className="chart-title">Elevation Profile & BPM Distribution</div>
          <svg width={width} height={height} viewBox={`0 0 ${width} ${height}`} style={{ width: "100%" }}>
            <defs>
              <linearGradient id="elevFill" x1="0%" y1="0%" x2="0%" y2="100%">
                <stop offset="0%" stopColor="rgba(26, 158, 143, 0.2)" />
                <stop offset="100%" stopColor="rgba(201, 58, 30, 0.05)" />
              </linearGradient>
            </defs>
            {terrainSegments}
            <path
              d={`${pathData} L${points[points.length - 1][0]} ${padding.top + chartHeight} L${padding.left} ${padding.top + chartHeight} Z`}
              fill="url(#elevFill)"
            />
            <path d={pathData} fill="none" stroke="rgba(26, 158, 143, 0.7)" strokeWidth="2.5" />

            <line
              x1={padding.left}
              y1={padding.top + chartHeight}
              x2={width - padding.right}
              y2={padding.top + chartHeight}
              stroke="rgba(148, 163, 184, 0.3)"
              strokeWidth="1"
            />

            <text x="20" y="20" fill="var(--slate-400)" fontSize="12">
              {Math.round(maxElev)}m
            </text>
            <text x="20" y={padding.top + chartHeight + 10} fill="var(--slate-400)" fontSize="12">
              {Math.round(minElev)}m
            </text>

            <text
              x={padding.left + chartWidth / 2}
              y={height - 10}
              fill="var(--slate-400)"
              fontSize="12"
              textAnchor="middle"
            >
              Distance (proportional)
            </text>
          </svg>
        </div>
      );
    }

    // ============ MAIN APP ============
    // ============ RUN DROP CARD ============
    function RunDropCard({ playlist, trail, baseBpm }) {
      if (!playlist || !trail || !playlist.segments || playlist.segments.length === 0) return null;

      const profile = trail.profile || [];
      const bpms = playlist.segments.map(s => s.bpm);
      const hasElev = profile.length >= 2 && !profile.every(v => Math.abs(v - profile[0]) < 5);

      // Featured track: highest BPM segment
      let peakIdx = 0;
      bpms.forEach((b, i) => { if (b > bpms[peakIdx]) peakIdx = i; });
      const featuredSeg = playlist.segments[peakIdx];
      const featuredTrack = featuredSeg?.tracks?.[0];

      // BPM range
      const minBpm = Math.min(...bpms);
      const maxBpm = Math.max(...bpms);

      // SVG dimensions
      const w = 400, h = 90;
      const pad = { top: 14, bot: 4 };
      const chartH = h - pad.top - pad.bot;

      // Elevation path (filled area)
      let elevPath = "";
      let elevFillPath = "";
      if (hasElev) {
        const minE = Math.min(...profile);
        const maxE = Math.max(...profile);
        const rng = maxE - minE || 1;
        const ePts = profile.map((e, i) => [
          (i / (profile.length - 1)) * w,
          pad.top + chartH - ((e - minE) / rng) * chartH * 0.85,
        ]);
        elevPath = ePts.map((p, i) => `${i === 0 ? "M" : "L"}${p[0].toFixed(1)} ${p[1].toFixed(1)}`).join(" ");
        elevFillPath = `${elevPath} L${w} ${h} L0 ${h} Z`;

      // BPM path (line overlay, mapped to same vertical space)
      const bpmRng = maxBpm - minBpm || 1;
      const bpmPts = bpms.map((b, i) => [
        (i / Math.max(bpms.length - 1, 1)) * w,
        pad.top + chartH - ((b - minBpm) / bpmRng) * chartH * 0.75,
      ]);

        <div className="run-drop-card" id="run-drop-card">

                <stop offset="100%" stopColor="rgba(255,255,255,0.02)" />
              </linearGradient>
              <linearGradient id="bpmGrad" x1="0%" y1="0%" x2="100%" y2="0%">
                <stop offset="0%" stopColor="#1A9E8F" />
                <stop offset="50%" stopColor="#C98A0C" />
                <stop offset="100%" stopColor="#C93A1E" />
              </linearGradient>
            </defs>
            {/* Elevation filled area */}
            {hasElev && (
              <>
                <path d={elevFillPath} fill="url(#elevFill)" />
                <path d={elevPath} fill="none" stroke="rgba(255,255,255,0.15)" strokeWidth="1.5" />

            )}
            {/* BPM line — the heartbeat of the playlist */}
            <path d={bpmPath} fill="none" stroke="url(#bpmGrad)" strokeWidth="2.5" strokeLinecap="round" />
            {/* BPM dots at each segment */}
            {bpmPts.map((p, i) => (
              <circle key={i} cx={p[0]} cy={p[1]} r={i === peakIdx ? 4.5 : 2} fill={i === peakIdx ? "#C93A1E" : "rgba(255,255,255,0.5)"} stroke={i === peakIdx ? "white" : "none"} strokeWidth={i === peakIdx ? 1.5 : 0}>
                {i === peakIdx && <animate attributeName="r" values="4;6;4" dur="2s" repeatCount="indefinite" />}
              </circle>
            ))}
            {/* BPM labels */}
            <text x="4" y={bpmPts[0][1] - 5} fill="rgba(255,255,255,0.5)" fontSize="9" fontWeight="600" fontFamily="Helvetica Neue, sans-serif">{startBpm}</text>
            <text x={w - 4} y={bpmPts[bpmPts.length-1][1] - 5} fill="rgba(255,255,255,0.5)" fontSize="9" fontWeight="600" fontFamily="Helvetica Neue, sans-serif" textAnchor="end">{endBpm}</text>
            <text x={bpmPts[peakIdx][0]} y={bpmPts[peakIdx][1] - 8} fill="#C93A1E" fontSize="10" fontWeight="700" fontFamily="Helvetica Neue, sans-serif" textAnchor="middle">{maxBpm}</text>
          </svg>

          {/* Legend */}
          <div style={{ display: "flex", gap: "16px", alignItems: "center", marginTop: "4px", marginBottom: "8px" }}>
            {hasElev && (
              <div style={{ display: "flex", alignItems: "center", gap: "5px", fontSize: "0.65rem", opacity: 0.5 }}>
                <div style={{ width: "16px", height: "2px", background: "rgba(255,255,255,0.4)" }}></div>
                Elevation

            <div style={{ display: "flex", alignItems: "center", gap: "5px", fontSize: "0.65rem", opacity: 0.7 }}>

              BPM

      );
    }

        if (code) {

          // Build artist affinity map: artistId → average popularity from user's top tracks
          const artistAffinityMap = new Map();
          topTracksData.items.forEach((t) => {
            (t.artists || []).forEach((a) => {

            });
          });
          // Convert arrays to averages
          artistAffinityMap.forEach((pops, artistId) => {
            artistAffinityMap.set(artistId, pops.reduce((a, b) => a + b, 0) / pops.length);
          });

          setTopSeeds({
            trackIds: topTracksData.items.map((t) => t.id),
            trackNames: topTracksData.items.slice(0, 5).map((t) => t.name),

      const flatRunTrail = flatRunActive

        : null;

      const allTrails = React.useMemo(() => [...TRAIL_DATABASE, ...userTrails], [userTrails]);

      }, [trailSearch, trailFilter, allTrails]);

      const currentTrail = flatRunTrail || gpxTrail || selectedTrail;

      const trailElevProfile = currentTrail ? currentTrail.profile : [];
      const elevSegments = currentTrail ? calculateElevationGradient(trailElevProfile, currentTrail.distance) : [];

      const trailDistance = currentTrail ? currentTrail.distance : 0;

      const trailElevGain = currentTrail ? currentTrail.elevGain : 0;

      // Compute smart estimate when trail + activities change
      React.useEffect(() => {
        if (stravaActivities && stravaActivities.length >= 2 && currentTrail && currentTrail.profile) {

      // Auto-set target time: smartEstimate > personalModel > generic
      useEffect(() => {

      // Compute race plan — use target time from H:MM inputs (which are already smart-populated)

      }, [personalModel, currentTrail, targetTimeHours, targetTimeMinutes]);

      let paceMin = targetPace;
      let estimatedTime = 0;

      if (targetMode === "pace" && trailDistance) {
        estimatedTime = trailDistance * paceMin;
      } else if (targetMode === "distance-time" && trailDistance && targetTime) {
        paceMin = targetTime / trailDistance;
      } else if (targetMode === "time" && trailDistance) {
        const hours = parseInt(targetTimeHours) || 0;
        const minutes = parseInt(targetTimeMinutes) || 0;
        const totalMinutes = hours * 60 + minutes;
        paceMin = totalMinutes / trailDistance;
      }

      const baseBpm = paceToBaseBpm(paceMin);

      // ============ TRACK SCORING ALGORITHM ============
      // Scores a candidate track (0–100) using 4 signals:
      //   User Affinity (40), BPM Proximity (30), Popularity (20), Artist Variety (−10)
      function scoreTrack(track, targetBpm, seeds, usedArtistCounts) {
        // Signal 1: BPM Proximity (0–30 pts) — linear decay over ±30 BPM
        const bpmDiff = Math.abs((track.tempo || targetBpm) - targetBpm);
        const bpmScore = Math.max(0, 30 * (1 - bpmDiff / 30));

        // Signal 2: User Affinity (0–40 pts)
        let affinityScore = 0;
        if (seeds && seeds.topTracksFull) {
          const isTopTrack = seeds.topTracksFull.some((t) => t.id === track.id);
          if (isTopTrack) {
            affinityScore = 40; // Direct match — user actively listens to this track
          } else if (track.artists && track.artists.length > 0 && seeds.artistAffinityMap) {
            // Check if any of the track's artists appear in user's history
            const bestArtistAffinity = Math.max(
              0,
              ...track.artists.map((a) => seeds.artistAffinityMap.get(a.id) || 0)
            );
            if (bestArtistAffinity > 0) {
              affinityScore = 20 + (bestArtistAffinity / 100) * 20; // 20–40 scaled
            }
          }
        }

        // Signal 3: Worldwide Popularity (0–20 pts)
        const popularityScore = ((track.popularity || 0) / 100) * 20;

        // Signal 4: Artist Variety Penalty (0 to −10 pts)
        let varietyPenalty = 0;
        if (track.artists && track.artists.length > 0) {
          const primaryArtistId = track.artists[0].id;
          const count = usedArtistCounts.get(primaryArtistId) || 0;
          if (count >= 3) {
            varietyPenalty = 10; // Hard penalty — too many tracks from this artist
          } else if (count > 0) {
            varietyPenalty = 5 * count; // Soft penalty per appearance
          }
        }

        return Math.max(0, Math.min(100, bpmScore + affinityScore + popularityScore - varietyPenalty));
      }

      // ── Handle TCX file imports ──
      const handleTCXFiles = async (files) => {
        setLoading(true);
        setMessage({ type: "info", text: `Parsing ${files.length} activity file${files.length > 1 ? "s" : ""}...` });
        try {
          const allActivities = [];
          for (const file of files) {
            const text = await file.text();
            const parsed = parseTCXFile(text);
            allActivities.push(...parsed);
          }
          if (allActivities.length === 0) {
            setMessage({ type: "error", text: "No running activities found in the uploaded files. Make sure they contain GPS + HR data." });
            setLoading(false);
            return;
          }
          // If we already have activities, merge and deduplicate
          const merged = stravaActivities ? [...stravaActivities, ...allActivities] : allActivities;
          const combined = deduplicateActivities(merged);
          setStravaActivities(combined);
          const model = PerformanceLab.buildPersonalModel(combined);
          setPersonalModel(model);
          setStravaConnected(true);
          const deduped = merged.length - combined.length;
          setMessage({
            type: "success",
            text: `${allActivities.length} activit${allActivities.length > 1 ? "ies" : "y"} imported (${combined.length} total${deduped > 0 ? `, ${deduped} duplicate${deduped > 1 ? "s" : ""} removed` : ""}). Your model has been updated.`
          });
        } catch (err) {
          setMessage({ type: "error", text: `Import error: ${err.message}` });
        }
        setLoading(false);
      };

      const generatePlaylistTracks = async () => {
        if (!currentTrail) {
          setMessage({ type: "error", text: "Please select or import a trail" });
          return;
        }

        setLoading(true);
        try {
          const segments = elevSegments;
          const tracksBySegment = [];

          // ── Dedup & variety state (reset each generation) ──
          const usedTrackIds = new Set();
          const usedArtistCounts = new Map();
          const OVER_FETCH = 10; // Fetch 10 candidates per slot, pick best 1

          // ── Calculate how many tracks we need total based on estimated run duration ──
          const AVG_TRACK_DURATION_MIN = 3.5;
          let runDurationMin;
          if (targetMode === "time") {
            runDurationMin = (parseInt(targetTimeHours) || 0) * 60 + (parseInt(targetTimeMinutes) || 0);
          } else if (targetMode === "distance-time" && targetTime) {
            runDurationMin = targetTime;
          } else {
            runDurationMin = trailDistance * paceMin;
          }
          runDurationMin = Math.max(runDurationMin, 10); // minimum 10 min
          const bufferedDuration = runDurationMin * 1.1; // +10% buffer so music doesn't cut out early
          const totalTracksNeeded = Math.max(segments.length, Math.ceil(bufferedDuration / AVG_TRACK_DURATION_MIN));

          // ── Distribute tracks across segments proportionally by distance ──
          const totalDist = segments.reduce((sum, s) => sum + (s.distM || 1), 0);
          const tracksPerSegment = segments.map((seg) => {
            const proportion = (seg.distM || 1) / totalDist;
            return Math.max(1, Math.round(proportion * totalTracksNeeded));
          });

          const totalSegments = segments.length;
          for (let segIdx = 0; segIdx < segments.length; segIdx++) {
            const seg = segments[segIdx];
            const numTracksForSeg = tracksPerSegment[segIdx];
            // Progressive BPM: start ~12% slower, ramp up to ~5% faster by end
            const progress = totalSegments > 1 ? segIdx / (totalSegments - 1) : 1;
            const progressionFactor = 0.88 + 0.17 * Math.pow(progress, 1.3);
            const rawBpm = gradientToBpm(seg.gradient, baseBpm);
            let bpm;
            if (racePlan && racePlan.segments.length > 0) {
              const rpLen = racePlan.segments.length;
              const rpStart = Math.floor((segIdx / totalSegments) * rpLen);
              const rpEnd = Math.min(rpLen, Math.floor(((segIdx + 1) / totalSegments) * rpLen));
              const rpSlice = racePlan.segments.slice(rpStart, Math.max(rpStart + 1, rpEnd));
              bpm = Math.round(rpSlice.reduce((a, s) => a + s.targetBpm, 0) / rpSlice.length);
            } else {
              bpm = Math.round(Math.max(105, Math.min(185, rawBpm * progressionFactor)));
            }
            const segTracks = [];

            for (let trackSlot = 0; trackSlot < numTracksForSeg; trackSlot++) {
              let selectedTrack = null;
              // Slight BPM variation within segment for variety
              const slotBpm = Math.round(bpm + (trackSlot > 0 ? (Math.random() * 6 - 3) : 0));

              if (spotifyToken) {
                try {
                  let rec;
                  if (musicMode === "random" && topSeeds) {
                    const shuffledTracks = [...topSeeds.trackIds].sort(() => Math.random() - 0.5);
                    rec = await searchTracksByBpmPersonalized(
                      spotifyToken, slotBpm, OVER_FETCH,
                      shuffledTracks.slice(0, 5),
                      [], topSeeds
                    );
                  } else if (musicMode === "mood" && selectedMood) {
                    rec = await searchTracksByBpm(spotifyToken, slotBpm, OVER_FETCH, selectedMood);
                  } else if (musicMode === "my-taste" && topSeeds) {
                    const shuffledTracks = [...topSeeds.trackIds].sort(() => Math.random() - 0.5);
                    const shuffledArtists = [...topSeeds.artistIds].sort(() => Math.random() - 0.5);
                    rec = await searchTracksByBpmPersonalized(
                      spotifyToken, slotBpm, OVER_FETCH,
                      shuffledTracks.slice(0, 3),
                      shuffledArtists.slice(0, 2), topSeeds
                    );
                  } else {
                    const genres = ["electronic", "rock", "pop", "indie"];
                    const genre = genres[Math.floor(Math.random() * genres.length)];
                    rec = await searchTracksByBpm(spotifyToken, slotBpm, OVER_FETCH, genre);
                  }

                  if (rec.tracks && rec.tracks.length > 0) {
                    const candidates = rec.tracks
                      .filter((t) => t.id && !usedTrackIds.has(t.id))
                      .map((t) => ({
                        ...t,
                        _score: scoreTrack(t, slotBpm, topSeeds, usedArtistCounts),
                      }))
                      .sort((a, b) => b._score - a._score);

                    if (candidates.length > 0) {
                      const best = candidates[0];
                      usedTrackIds.add(best.id);
                      const primaryArtistId = best.artists?.[0]?.id;
                      if (primaryArtistId) {
                        usedArtistCounts.set(primaryArtistId, (usedArtistCounts.get(primaryArtistId) || 0) + 1);
                      }
                      selectedTrack = {
                        name: best.name,
                        artist: best.artists?.[0]?.name || "Unknown Artist",
                        bpm: slotBpm,
                        uri: best.uri,
                        popularity: best.popularity || 0,
                        score: best._score,
                      };
                    }
                  }
                } catch (err) {
                  console.warn("Spotify API error for segment", segIdx, "slot", trackSlot, err);
                  if (err.message?.includes("expired") || err.message?.includes("reconnect")) {
                    setSpotifyToken(null);
                    setSpotifyUser(null);
                    setMessage({ type: "error", text: "Spotify session expired. Please reconnect to get personalized tracks." });
                  }
                }
              }

              if (!selectedTrack) {
                const mockCandidate = MOCK_TRACKS
                  .filter((t) => Math.abs(t.bpm - slotBpm) <= 20 && !usedTrackIds.has(t.uri))
                  .sort((a, b) => Math.abs(a.bpm - slotBpm) - Math.abs(b.bpm - slotBpm))
                  .slice(0, 1)[0];
                if (mockCandidate) {
                  usedTrackIds.add(mockCandidate.uri);
                  selectedTrack = { ...mockCandidate, bpm: slotBpm, score: 0 };
                }
              }

              if (selectedTrack) segTracks.push(selectedTrack);
            }

            tracksBySegment.push({
              bpm,
              gradient: seg.gradient,
              tracks: segTracks,
            });
          }

          const allTracks = tracksBySegment.flatMap((seg) => seg.tracks);
          const allTrackUris = allTracks.map((t) => t.uri);

          setGeneratedPlaylist({
            segments: tracksBySegment,
            tracks: allTracks,
            trackUris: allTrackUris,
            pace: paceMin.toFixed(1),
            time: estimatedTime.toFixed(0),
          });

          const uniqueCount = new Set(allTrackUris).size;
          setMessage({ type: "success", text: `Playlist generated! ${uniqueCount} unique tracks matched to your trail.` });
        } catch (err) {
          setMessage({ type: "error", text: `Generation error: ${err.message}` });
        } finally {
          setLoading(false);
        }
      };

      const savePlaylistToSpotify = async () => {
        if (!generatedPlaylist || !spotifyToken || !spotifyUser) {
          setMessage({ type: "error", text: "Not connected to Spotify or no playlist generated" });
          return;
        }

        // Filter out mock track URIs (they start with spotify:track:mock)
        const realTrackUris = generatedPlaylist.trackUris.filter(
          (uri) => uri && !uri.includes(":mock")
        );

        if (realTrackUris.length === 0) {
          setMessage({ type: "error", text: "No real Spotify tracks found. Try regenerating or connect to Spotify first." });
          return;
        }

        setLoading(true);
        try {
          const trailName = currentTrail?.name || "Custom Trail";
          const playlist = await createSpotifyPlaylist(
            spotifyToken,
            spotifyUser.id,
            `Canto: ${trailName} @ ${targetPace.toFixed(1)}/km`,
            `Generated with Canto for ${trailName} at ${paceMin.toFixed(1)} min/km pace`,
            realTrackUris
          );

          setMessage({
            type: "success",
            text: `Playlist saved! ${playlist.name} (${realTrackUris.length} tracks) - Check your Spotify library`,
          });
        } catch (err) {
          setMessage({ type: "error", text: `Save error: ${err.message}` });
        } finally {
          setLoading(false);
        }
      };

      const handleGpxUpload = (e) => {
        const file = e.target.files?.[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = (evt) => {
          try {
            const gpxData = parseGPX(evt.target?.result || "");
            const processed = processGPXPoints(gpxData.points);
            const newTrail = {
              id: `gpx-${Date.now()}`,
              name: gpxData.name,
              location: "Imported route",
              distance: processed.distance,
              elevGain: processed.elevGain,
              region: "Custom",
              difficulty: processed.elevGain / processed.distance > 60 ? "Hard" : processed.elevGain / processed.distance > 30 ? "Medium" : "Easy",
              country: "",
              type: "trail",
              source: "gpx",
              profile: processed.profile,
            };
            setGpxTrail(newTrail);
            // Add to persistent user trail library
            setUserTrails(prev => {
              const updated = [...prev, newTrail];
              localStorage.setItem("cantoUserTrails", JSON.stringify(updated));
              return updated;
            });
            setSelectedTrail(null);
            setFlatRunActive(false);
            setMessage({ type: "success", text: `GPX loaded: ${gpxData.name} — added to your race library` });
          } catch (err) {
            setMessage({ type: "error", text: `GPX error: ${err.message}` });
          }
        };
        reader.readAsText(file);
      };

      // === Auth Handlers ===
      const handleAuth = async (e) => {
        e.preventDefault();
        setAuthError("");
        setAuthLoading(true);
        try {
          if (authMode === "register") {
            const data = await CantoAPI.register(authEmail, authPassword, authName);
            setCantoUser(data.user);
          } else {
            const data = await CantoAPI.login(authEmail, authPassword);
            setCantoUser(data.user);
          }
          setShowAuthModal(false);
          setAuthEmail(""); setAuthPassword(""); setAuthName("");
          setMessage({ type: "success", text: "Welcome to Canto!" });
        } catch (err) {
          setAuthError(err.message);
        }
        setAuthLoading(false);
      };

      const handleLogout = async () => {
        await CantoAPI.logout();
        setCantoUser(null);
        setShowAccountMenu(false);
        setMessage({ type: "success", text: "Logged out" });
      };

      const handleSavePlaylistToCloud = async () => {
        if (!cantoUser || !generatedPlaylist) return;
        setSavingPlaylist(true);
        try {
          const trail = selectedTrail || gpxTrail;
          const trackData = generatedPlaylist.tracks.map((t, i) => ({
            segmentIndex: i, trackName: t.name, artistName: t.artist,
            spotifyUri: t.uri, bpm: t.bpm, targetBpm: t.targetBpm || t.bpm,
            popularity: t.popularity, score: t.score,
            pacePerKm: t.pacePerKm, gradient: t.gradient,
            terrainLabel: t.gradient > 0.008 ? "uphill" : t.gradient < -0.008 ? "downhill" : "flat",
          }));
          await CantoAPI.savePlaylist({
            name: trail ? trail.name + " Playlist" : "Canto Playlist",
            musicMode: musicMode,
            trailId: null,
            tracks: trackData,
          });
          setMessage({ type: "success", text: "Playlist saved to your account!" });
        } catch (err) {
          setMessage({ type: "error", text: err.message });
        }
        setSavingPlaylist(false);
      };

      const handleLoadMyPlaylists = async () => {
        if (!cantoUser) return;
        try {
          const data = await CantoAPI.getPlaylists();
          setSavedPlaylists(data.playlists || []);
          setShowMyPlaylists(true);
        } catch (err) {
          setMessage({ type: "error", text: "Failed to load playlists" });
        }
      };

      const handleGoogleLogin = () => {
        alert("Google login coming soon — use email/password for now");
      };

      const handleStravaLogin = () => {
        const clientId = process.env.STRAVA_CLIENT_ID || "211688";
        const redirect = encodeURIComponent(window.location.origin + window.location.pathname);
        window.location.href = "https://www.strava.com/oauth/authorize?client_id=" + clientId + "&response_type=code&redirect_uri=" + redirect + "&scope=read,activity:read&state=strava";
      };

      // Supabase auth state change listener
      React.useEffect(() => {
        const { data: { subscription } } = supabase.auth.onAuthStateChange(async (event, session) => {
          if (session?.user) {
            try {
              const me = await CantoAPI.getMe();
              setCantoUser(me);
              localStorage.setItem("cantoUser", JSON.stringify(me));
            } catch (e) { console.warn("Auth state change error:", e); }
          } else {
            setCantoUser(null);
            localStorage.removeItem("cantoUser");
          }
        });
        return () => subscription.unsubscribe();
      }, []);

      return (
        <div className="container">
          <header style={{ position: "relative" }}>
            <div className="logo-container">
              <div className="logo-icon" style={{ fontFamily: "Georgia, serif", fontStyle: "italic", fontWeight: "bold" }}>C</div>
              <h1 style={{ fontFamily: "Georgia, 'Times New Roman', serif", letterSpacing: "-0.02em" }}>Canto</h1>
            </div>
            <p className="tagline">{t("tagline")}</p>
            {/* Account button + Language picker — top right of header */}
            <div style={{ position: "absolute", top: "16px", right: "16px", display: "flex", gap: "8px", alignItems: "center" }}>
              <div style={{ display: "flex", gap: "2px", marginRight: "4px" }}>
                {[
                  { code: "en", flag: "🇬🇧" },
                  { code: "fr", flag: "🇫🇷" },
                  { code: "de", flag: "🇩🇪" },
                  { code: "es", flag: "🇪🇸" },
                ].map(l => (
                  <button
                    key={l.code}
                    onClick={() => changeLang(l.code)}
                    style={{
                      background: lang === l.code ? "rgba(255,255,255,0.25)" : "transparent",
                      border: "none", cursor: "pointer", fontSize: "1rem",
                      borderRadius: "6px", padding: "3px 5px",
                      opacity: lang === l.code ? 1 : 0.5,
                      transition: "all 0.2s",
                    }}
                    title={l.code.toUpperCase()}
                  >{l.flag}</button>
                ))}
              </div>
              {cantoUser ? (
                <div style={{ position: "relative" }}>
                  <button onClick={() => setShowAccountMenu(!showAccountMenu)} style={{
                    display: "flex", alignItems: "center", gap: "6px",
                    padding: "6px 14px", borderRadius: "20px",
                    background: "linear-gradient(135deg, var(--ember), #e85d04)",
                    color: "white", border: "none", cursor: "pointer",
                    fontSize: "0.8rem", fontWeight: 600,
                  }}>
                    <span style={{ width: "22px", height: "22px", borderRadius: "50%", background: "rgba(255,255,255,0.25)", display: "flex", alignItems: "center", justifyContent: "center", fontSize: "0.7rem" }}>
                      {cantoUser.displayName?.[0]?.toUpperCase() || "U"}
                    </span>
                    {cantoUser.displayName || cantoUser.email}
                  </button>
                  {showAccountMenu && (
                    <div style={{
                      position: "absolute", top: "40px", right: 0, zIndex: 100,
                      background: "white", borderRadius: "10px", boxShadow: "0 8px 32px rgba(0,0,0,0.15)",
                      minWidth: "200px", overflow: "hidden", border: "1px solid rgba(0,0,0,0.08)",
                    }}>
                      <div style={{ padding: "14px 16px", borderBottom: "1px solid rgba(0,0,0,0.06)", fontSize: "0.8rem", color: "#666" }}>
                        {cantoUser.email}
                      </div>
                      <button onClick={handleLoadMyPlaylists} style={{
                        display: "block", width: "100%", padding: "12px 16px", border: "none",
                        background: "transparent", textAlign: "left", cursor: "pointer", fontSize: "0.85rem",
                      }}>My Playlists</button>
                      <button onClick={handleLogout} style={{
                        display: "block", width: "100%", padding: "12px 16px", border: "none",
                        background: "transparent", textAlign: "left", cursor: "pointer", fontSize: "0.85rem", color: "#c33",
                      }}>Log Out</button>
                    </div>
                  )}
                </div>
              ) : (
                <button onClick={() => { setShowAuthModal(true); setAuthMode("login"); }} style={{
                  padding: "6px 16px", borderRadius: "20px",
                  background: "linear-gradient(135deg, var(--ember), #e85d04)",
                  color: "white", border: "none", cursor: "pointer",
                  fontSize: "0.8rem", fontWeight: 600,
                }}>Sign In</button>
              )}
            </div>
          </header>

          {/* Auth Modal */}
          {showAuthModal && (
            <div style={{
              position: "fixed", inset: 0, zIndex: 1000,
              background: "rgba(0,0,0,0.5)", backdropFilter: "blur(4px)",
              display: "flex", alignItems: "center", justifyContent: "center",
            }} onClick={(e) => e.target === e.currentTarget && setShowAuthModal(false)}>
              <div style={{
                background: "white", borderRadius: "16px", padding: "32px",
                width: "380px", maxWidth: "90vw", boxShadow: "0 20px 60px rgba(0,0,0,0.3)",
                animation: "fadeIn 0.2s ease",
              }}>
                <h2 style={{ margin: "0 0 4px", fontSize: "1.4rem", background: "linear-gradient(135deg, var(--ember), #e85d04)", WebkitBackgroundClip: "text", WebkitTextFillColor: "transparent" }}>
                  {authMode === "login" ? "Welcome Back" : "Create Account"}
                </h2>
                <p style={{ margin: "0 0 20px", fontSize: "0.85rem", color: "#666" }}>
                  {authMode === "login" ? "Sign in to access your playlists and race plans" : "Join Canto to save your playlists and data"}
                </p>

                {/* SSO buttons */}
                <div style={{ display: "flex", flexDirection: "column", gap: "8px", marginBottom: "16px" }}>
                  <button onClick={handleGoogleLogin} disabled style={{
                    padding: "10px", borderRadius: "8px", border: "1px solid #ddd",
                    background: "#f5f5f5", cursor: "not-allowed", fontSize: "0.85rem", opacity: 0.5,
                    display: "flex", alignItems: "center", justifyContent: "center", gap: "8px",
                  }}>
                    <svg width="18" height="18" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
                    Google (coming soon)
                  </button>
                  <button onClick={() => { window.location.href = "https://accounts.spotify.com/authorize?client_id=" + (SPOTIFY_CLIENT_ID) + "&response_type=code&redirect_uri=" + encodeURIComponent(window.location.origin + window.location.pathname) + "&scope=user-read-private%20user-read-email&state=spotify_sso"; }} style={{
                    padding: "10px", borderRadius: "8px", border: "none",
                    background: "#1DB954", color: "white", cursor: "pointer", fontSize: "0.85rem",
                    display: "flex", alignItems: "center", justifyContent: "center", gap: "8px", fontWeight: 600,
                  }}>
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="white"><path d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0zm5.521 17.34c-.24.359-.66.48-1.021.24-2.82-1.74-6.36-2.101-10.561-1.141-.418.122-.779-.179-.899-.539-.12-.421.18-.78.54-.9 4.56-1.021 8.52-.6 11.64 1.32.42.18.479.659.301 1.02zm1.44-3.3c-.301.42-.841.6-1.262.3-3.239-1.98-8.159-2.58-11.939-1.38-.479.12-1.02-.12-1.14-.6-.12-.48.12-1.021.6-1.141C9.6 9.9 15 10.561 18.72 12.84c.361.181.54.78.241 1.2zm.12-3.36C15.24 8.4 8.82 8.16 5.16 9.301c-.6.179-1.2-.181-1.38-.721-.18-.601.18-1.2.72-1.381 4.26-1.26 11.28-1.02 15.721 1.621.539.3.719 1.02.419 1.56-.299.421-1.02.599-1.559.3z"/></svg>
                    Continue with Spotify
                  </button>
                  <button onClick={handleStravaLogin} style={{
                    padding: "10px", borderRadius: "8px", border: "none",
                    background: "#FC4C02", color: "white", cursor: "pointer", fontSize: "0.85rem",
                    display: "flex", alignItems: "center", justifyContent: "center", gap: "8px", fontWeight: 600,
                  }}>
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="white"><path d="M15.387 17.944l-2.089-4.116h-3.065L15.387 24l5.15-10.172h-3.066m-7.008-5.599l2.836 5.599h4.172L10.463 0l-7 13.828h4.169"/></svg>
                    Continue with Strava
                  </button>
                </div>

                <div style={{ display: "flex", alignItems: "center", gap: "12px", margin: "16px 0", fontSize: "0.8rem", color: "#999" }}>
                  <div style={{ flex: 1, height: "1px", background: "#e0e0e0" }} />
                  or use email
                  <div style={{ flex: 1, height: "1px", background: "#e0e0e0" }} />
                </div>

                <form onSubmit={handleAuth} style={{ display: "flex", flexDirection: "column", gap: "10px" }}>
                  {authMode === "register" && (
                    <input type="text" placeholder="Display Name" value={authName} onChange={(e) => setAuthName(e.target.value)} required style={{
                      padding: "10px 14px", borderRadius: "8px", border: "1px solid #ddd",
                      fontSize: "0.9rem", outline: "none",
                    }} />
                  )}
                  <input type="email" placeholder="Email" value={authEmail} onChange={(e) => setAuthEmail(e.target.value)} required style={{
                    padding: "10px 14px", borderRadius: "8px", border: "1px solid #ddd",
                    fontSize: "0.9rem", outline: "none",
                  }} />
                  <input type="password" placeholder="Password" value={authPassword} onChange={(e) => setAuthPassword(e.target.value)} required minLength={8} style={{
                    padding: "10px 14px", borderRadius: "8px", border: "1px solid #ddd",
                    fontSize: "0.9rem", outline: "none",
                  }} />
                  {authError && <div style={{ color: "#c33", fontSize: "0.8rem" }}>{authError}</div>}
                  <button type="submit" disabled={authLoading} style={{
                    padding: "12px", borderRadius: "8px", border: "none",
                    background: "linear-gradient(135deg, var(--ember), #e85d04)",
                    color: "white", fontWeight: 700, fontSize: "0.9rem", cursor: "pointer",
                    opacity: authLoading ? 0.6 : 1,
                  }}>
                    {authLoading ? "..." : authMode === "login" ? "Sign In" : "Create Account"}
                  </button>
                </form>

                <p style={{ margin: "14px 0 0", fontSize: "0.8rem", color: "#666", textAlign: "center" }}>
                  {authMode === "login" ? "Don't have an account? " : "Already have an account? "}
                  <a href="#" onClick={(e) => { e.preventDefault(); setAuthMode(authMode === "login" ? "register" : "login"); setAuthError(""); }} style={{ color: "var(--ember)", fontWeight: 600 }}>
                    {authMode === "login" ? "Sign Up" : "Sign In"}
                  </a>
                </p>
              </div>
            </div>
          )}

          {/* My Playlists Drawer */}
          {showMyPlaylists && (
            <div style={{
              position: "fixed", inset: 0, zIndex: 1000,
              background: "rgba(0,0,0,0.5)", backdropFilter: "blur(4px)",
              display: "flex", justifyContent: "flex-end",
            }} onClick={(e) => e.target === e.currentTarget && setShowMyPlaylists(false)}>
              <div style={{
                background: "white", width: "400px", maxWidth: "90vw", height: "100vh",
                boxShadow: "-8px 0 32px rgba(0,0,0,0.15)", padding: "24px",
                overflowY: "auto", animation: "fadeIn 0.2s ease",
              }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: "20px" }}>
                  <h2 style={{ margin: 0, fontSize: "1.2rem" }}>My Playlists</h2>
                  <button onClick={() => setShowMyPlaylists(false)} style={{
                    border: "none", background: "transparent", fontSize: "1.4rem", cursor: "pointer", color: "#999",
                  }}>&times;</button>
                </div>
                {savedPlaylists.length === 0 ? (
                  <div style={{ textAlign: "center", padding: "40px 0", color: "#999" }}>
                    <div style={{ fontSize: "2rem", marginBottom: "8px" }}>&#127925;</div>
                    <p>No saved playlists yet.</p>
                    <p style={{ fontSize: "0.85rem" }}>Generate a playlist and save it to see it here.</p>
                  </div>
                ) : (
                  savedPlaylists.map((pl) => (
                    <div key={pl.id} style={{
                      padding: "14px", borderRadius: "10px", marginBottom: "10px",
                      border: "1px solid rgba(0,0,0,0.06)", background: "rgba(0,0,0,0.01)",
                    }}>
                      <div style={{ fontWeight: 600, fontSize: "0.95rem" }}>{pl.name}</div>
                      <div style={{ fontSize: "0.8rem", color: "#666", marginTop: "4px" }}>
                        {pl.total_tracks} tracks &middot; {pl.music_mode} &middot; {new Date(pl.created_at).toLocaleDateString()}
                      </div>
                      {pl.trail_name && (
                        <div style={{ fontSize: "0.75rem", color: "var(--ember)", marginTop: "2px" }}>{pl.trail_name}</div>
                      )}
                      {pl.spotify_url && (
                        <a href={pl.spotify_url} target="_blank" rel="noopener" style={{
                          display: "inline-block", marginTop: "6px", fontSize: "0.75rem",
                          color: "#1DB954", fontWeight: 600,
                        }}>Open in Spotify &rarr;</a>
                      )}
                    </div>
                  ))
                )}
              </div>
            </div>
          )}

          {/* Connections Bar — Spotify + Strava + Garmin */}
          <div style={{
            display: "flex", alignItems: "center", gap: "8px", flexWrap: "wrap",
            marginBottom: "24px", padding: "10px 16px",
            background: "white", borderRadius: "10px",
            border: "1px solid rgba(15,15,19,0.06)",
            boxShadow: "0 1px 4px rgba(15,15,19,0.04)",
          }}>
            {/* Spotify */}
            {spotifyToken ? (
              <div style={{
                display: "flex", alignItems: "center", gap: "6px",
                padding: "6px 12px", borderRadius: "6px",
                background: "rgba(30,215,96,0.08)", fontSize: "0.75rem", fontWeight: 600,
                color: "#1DB954",
              }}>
                <span style={{ width: "7px", height: "7px", borderRadius: "50%", background: "#1DB954", display: "inline-block" }} />
                {spotifyUser?.display_name || "Spotify"}
                <button onClick={() => {
                  localStorage.removeItem("spotifyAccessToken");
                  localStorage.removeItem("spotifyRefreshToken");
                  localStorage.removeItem("spotifyCodeVerifier");
                  setSpotifyToken(null); setSpotifyUser(null); setTopSeeds(null); setGeneratedPlaylist(null);
                }} style={{ background: "none", border: "none", cursor: "pointer", color: "var(--stone-400)", fontSize: "0.7rem", marginLeft: "4px" }}>×</button>
              </div>
            ) : (
              <button onClick={startSpotifyAuth} style={{
                display: "flex", alignItems: "center", gap: "6px",
                padding: "6px 12px", borderRadius: "6px",
                background: "rgba(15,15,19,0.03)", border: "1px solid var(--stone-200)",
                fontSize: "0.75rem", fontWeight: 600, cursor: "pointer",
                color: "var(--stone-500)", transition: "all 0.2s",
              }}
              onMouseEnter={(e) => { e.currentTarget.style.borderColor = "#1DB954"; e.currentTarget.style.color = "#1DB954"; }}
              onMouseLeave={(e) => { e.currentTarget.style.borderColor = "var(--stone-200)"; e.currentTarget.style.color = "var(--stone-500)"; }}
              >
                <span>🎵</span> Spotify
              </button>
            )}

            {/* Strava */}
            {stravaApiConnected ? (
              <div style={{
                display: "flex", alignItems: "center", gap: "6px",
                padding: "6px 12px", borderRadius: "6px",
                background: "rgba(252,76,2,0.08)", fontSize: "0.75rem", fontWeight: 600,
                color: "var(--strava)",
              }}>
                <span style={{ width: "7px", height: "7px", borderRadius: "50%", background: "var(--strava)", display: "inline-block" }} />
                Strava
                <button onClick={() => {
                  localStorage.removeItem("stravaAccessToken");
                  setStravaApiConnected(false);
                }} style={{ background: "none", border: "none", cursor: "pointer", color: "var(--stone-400)", fontSize: "0.7rem", marginLeft: "4px" }}>×</button>
              </div>
            ) : (
              <button onClick={() => setShowStravaModal(true)} style={{
                display: "flex", alignItems: "center", gap: "6px",
                padding: "6px 12px", borderRadius: "6px",
                background: "rgba(15,15,19,0.03)", border: "1px solid var(--stone-200)",
                fontSize: "0.75rem", fontWeight: 600, cursor: "pointer",
                color: "var(--stone-500)", transition: "all 0.2s",
              }}
              onMouseEnter={(e) => { e.currentTarget.style.borderColor = "var(--strava)"; e.currentTarget.style.color = "var(--strava)"; }}
              onMouseLeave={(e) => { e.currentTarget.style.borderColor = "var(--stone-200)"; e.currentTarget.style.color = "var(--stone-500)"; }}
              >
                <span>🏃</span> Strava
              </button>
            )}

            {/* Garmin */}
            {garminConnected ? (
              <div style={{
                display: "flex", alignItems: "center", gap: "6px",
                padding: "6px 12px", borderRadius: "6px",
                background: "rgba(0,124,195,0.08)", fontSize: "0.75rem", fontWeight: 600,
                color: "var(--garmin)",
              }}>
                <span style={{ width: "7px", height: "7px", borderRadius: "50%", background: "var(--garmin)", display: "inline-block" }} />
                Garmin
                <button onClick={() => {
                  localStorage.removeItem("garminAccessToken");
                  setGarminConnected(false);
                }} style={{ background: "none", border: "none", cursor: "pointer", color: "var(--stone-400)", fontSize: "0.7rem", marginLeft: "4px" }}>×</button>
              </div>
            ) : (
              <button onClick={() => setShowGarminModal(true)} style={{
                display: "flex", alignItems: "center", gap: "6px",
                padding: "6px 12px", borderRadius: "6px",
                background: "rgba(15,15,19,0.03)", border: "1px solid var(--stone-200)",
                fontSize: "0.75rem", fontWeight: 600, cursor: "pointer",
                color: "var(--stone-500)", transition: "all 0.2s",
              }}
              onMouseEnter={(e) => { e.currentTarget.style.borderColor = "var(--garmin)"; e.currentTarget.style.color = "var(--garmin)"; }}
              onMouseLeave={(e) => { e.currentTarget.style.borderColor = "var(--stone-200)"; e.currentTarget.style.color = "var(--stone-500)"; }}
              >
                <span>⌚</span> Garmin
              </button>
            )}

            <div style={{ flex: 1 }} />
            <div style={{ fontSize: "0.65rem", color: "var(--stone-400)", textTransform: "uppercase", letterSpacing: "1px" }}>
              Connections
            </div>
          </div>



          {/* Messages */}
          {message && (
            <div className={`message message-${message.type}`}>
              {message.text}
            </div>
          )}

          {/* Compact Model Stats — replaces old Running Profile section */}
          {personalModel && (
            <div style={{
              display: "flex", alignItems: "center", gap: "12px", padding: "12px 16px",
              background: "white", borderRadius: "12px", marginBottom: "16px",
              border: "1px solid rgba(15,15,19,0.06)", flexWrap: "wrap",
            }}>
              <div style={{ fontSize: "0.65rem", fontWeight: 700, textTransform: "uppercase", letterSpacing: "1px", color: "var(--stone-400)", whiteSpace: "nowrap" }}>Your model</div>
              {[
                { v: PerformanceLab.formatPace(personalModel.basePace), l: "/km" },
                { v: personalModel.baseCadence, l: "spm" },
                { v: personalModel.avgHR, l: "bpm" },
                { v: personalModel.gradeCoeff > 0 ? `+${Math.round(personalModel.gradeCoeff / 10)}` : Math.round(personalModel.gradeCoeff / 10), l: "s/km/%" },
              ].map((s, i) => (
                <div key={i} style={{ display: "flex", alignItems: "baseline", gap: "3px" }}>
                  <span style={{ fontWeight: 800, fontSize: "0.88rem", color: "var(--ridge)" }}>{s.v}</span>
                  <span style={{ fontSize: "0.6rem", color: "var(--stone-400)" }}>{s.l}</span>
                </div>
              ))}
              <div style={{ marginLeft: "auto", display: "flex", gap: "6px", alignItems: "center" }}>
                <span style={{ fontSize: "0.65rem", color: "var(--stone-400)" }}>{personalModel.totalRuns} runs</span>
                <button
                  style={{ background: "none", border: "1px solid var(--stone-200)", borderRadius: "5px", padding: "3px 8px", fontSize: "0.62rem", cursor: "pointer", color: "var(--stone-400)" }}
                  onClick={() => document.getElementById("tcx-input").click()}
                >+</button>
              </div>
            </div>
          )}
          <input id="tcx-input" type="file" accept=".tcx,.fit" multiple style={{ display: "none" }}
            onChange={(e) => {
              const files = Array.from(e.target.files);
              if (files.length > 0) { handleTCXFiles(files); setImportSources(prev => [...new Set([...prev, "file"])]); }
              e.target.value = "";
            }}
          />

          {/* ══════ CANTO V2: RUN TIMELINE & INTELLIGENCE ══════ */}

          {/* Run Timeline — always visible */}
          {(
            <div className="section">
              <div className="section-title">
                <span className="section-icon">&#x1F3C3;</span>
                Your Runs
                {stravaActivities && <span style={{ marginLeft: "8px", fontSize: "0.72rem", fontWeight: 400, color: "var(--stone-400)" }}>{stravaActivities.length} analyzed</span>}
              </div>

              {(!stravaActivities || stravaActivities.length === 0) ? (
                <div className="onboarding-box">
                  <h3>Start with your data</h3>
                  <p>Connect Strava or import your runs. Every new run refines your analysis.</p>
                  <div className="onboarding-actions">
                    <button onClick={() => setShowStravaModal(true)} style={{ background: "var(--strava)", color: "white" }}>Connect Strava</button>
                    <button onClick={() => setShowGarminModal(true)} style={{ background: "var(--garmin)", color: "white" }}>Import Garmin</button>
                    <button onClick={() => {
                      setStravaActivities(DEMO_STRAVA_ACTIVITIES);
                      const model = PerformanceLab.buildPersonalModel(DEMO_STRAVA_ACTIVITIES);
                      setPersonalModel(model);
                      setStravaConnected(true);
                      setMessage({ type: "success", text: "Demo data loaded. Connect Strava to use your real runs." });
                    }} style={{ background: "var(--stone-700)", color: "white" }}>Try with demo data</button>
                  </div>
                </div>
              ) : (
                <div className="run-timeline">
                  {stravaActivities.filter(a => a.splits && a.splits.length > 1).map(run => {
                    const distKm = (run.distance / 1000).toFixed(1);
                    const avgPace = run.moving_time / (run.distance / 1000);
                    const paceStr = `${Math.floor(avgPace/60)}:${String(Math.round(avgPace%60)).padStart(2,"0")}`;
                    const date = run.start_date ? new Date(run.start_date) : null;
                    const dayStr = date ? date.getDate() : "";
                    const monthStr = date ? date.toLocaleDateString(lang === "fr" ? "fr-FR" : "en-US", { month: "short" }) : "";
                    const pacing = RunIntelligence.classifyPacing(run.splits);
                    const consistency = RunIntelligence.consistencyScore(run.splits);
                    const score = RunIntelligence.runScore(consistency, pacing, RunIntelligence.hrDrift(run.splits));
                    const isSelected = selectedRunForIntel?.id === run.id;

                    return (
                      <div key={run.id}>
                        <div
                          className={`run-timeline-item ${isSelected ? "selected" : ""}`}
                          onClick={() => setSelectedRunForIntel(isSelected ? null : run)}
                        >
                          <div className="run-timeline-date">
                            <span className="day">{dayStr}</span>
                            {monthStr}
                          </div>
                          <div className="run-timeline-info">
                            <h4>{run.name}</h4>
                            <div className="run-meta-line">
                              <span>{distKm} km</span>
                              <span>{paceStr}/km</span>
                              {run.total_elevation_gain > 0 && <span>+{Math.round(run.total_elevation_gain)}m</span>}
                              {run.average_heartrate > 0 && <span>{Math.round(run.average_heartrate)} bpm</span>}
                            </div>
                          </div>
                          <div className="run-timeline-score">
                            <div className="run-score-circle" style={{ background: RunIntelligence.scoreColor(score) }}>{score}</div>
                            <div className="run-score-label">{pacing.label}</div>
                          </div>
                        </div>

                        {/* Run Intelligence Panel */}
                        {isSelected && (() => {
                          const effortData = RunIntelligence.effortAdjustedPace(run.splits);
                          const hrDriftData = RunIntelligence.hrDrift(run.splits);
                          const blowUpKm = RunIntelligence.findBlowUpKm(run.splits);
                          const comparison = RunIntelligence.compareToSimilar(run, stravaActivities);
                          const verdictLines = RunIntelligence.generateVerdict(run, run.splits, pacing, consistency, hrDriftData, blowUpKm, comparison);
                          const maxPace = Math.max(...effortData.map(e => e.rawPace));
                          const minPace = Math.min(...effortData.map(e => e.rawPace));
                          const avgRunPace = run.moving_time / (run.distance / 1000);

                          return (
                            <div className="ri-panel">
                              {/* Key Insights */}
                              <div className="ri-insights">
                                <div className="ri-insight">
                                  <div className="label">Avg Pace</div>
                                  <div className="value" style={{ color: "var(--ridge)" }}>{paceStr}/km</div>
                                </div>
                                <div className="ri-insight">
                                  <div className="label">Consistency</div>
                                  <div className="value" style={{ color: RunIntelligence.scoreColor(consistency) }}>{consistency}%</div>
                                </div>
                                <div className="ri-insight">
                                  <div className="label">Strategy</div>
                                  <div className="value" style={{ color: pacing.color }}>{pacing.label}</div>
                                  <div className="detail">{pacing.desc}</div>
                                </div>
                                {hrDriftData && (
                                  <div className="ri-insight">
                                    <div className="label">HR Drift</div>
                                    <div className="value" style={{ color: hrDriftData.drift > 8 ? "var(--ember)" : "var(--glacier)" }}>
                                      {hrDriftData.drift > 0 ? "+" : ""}{hrDriftData.drift}%
                                    </div>
                                    <div className="detail">{hrDriftData.avgFirst} &rarr; {hrDriftData.avgSecond} bpm</div>
                                  </div>
                                )}
                              </div>

                              {/* Pace Chart */}
                              <div style={{ fontSize: "0.72rem", color: "var(--stone-400)", fontWeight: 600, marginBottom: "6px" }}>PACE BY KM</div>
                              <div className="pace-chart">
                                {effortData.map((d, i) => {
                                  const paceRange = maxPace - minPace || 1;
                                  const height = 20 + ((d.rawPace - minPace) / paceRange) * 60;
                                  const isFast = d.rawPace < avgRunPace * 0.95;
                                  const isSlow = d.rawPace > avgRunPace * 1.05;
                                  const barColor = isFast ? "var(--ember)" : isSlow ? "var(--gold)" : "var(--glacier)";
                                  const kmPaceStr = `${Math.floor(d.rawPace/60)}:${String(Math.round(d.rawPace%60)).padStart(2,"0")}`;
                                  return (
                                    <div key={i} className="pace-bar" style={{ height: `${height}%`, background: barColor }}>
                                      <div className="bar-tooltip">Km {d.km}: {kmPaceStr}/km{d.elev !== 0 ? ` (${d.elev > 0 ? "+" : ""}${d.elev}m)` : ""}</div>
                                    </div>
                                  );
                                })}
                              </div>
                              <div style={{ display: "flex", justifyContent: "space-between", fontSize: "0.6rem", color: "var(--stone-400)", marginBottom: "16px" }}>
                                <span>Km 1</span><span>Km {effortData.length}</span>
                              </div>

                              {/* Verdict */}
                              {verdictLines.length > 0 && (
                                <div className="ri-verdict-box">
                                  <div className="verdict-title">Analysis</div>
                                  {verdictLines.map((line, i) => <p key={i} style={{ marginBottom: i < verdictLines.length - 1 ? "8px" : 0 }}>{line}</p>)}
                                </div>
                              )}

                              {/* Cross-run comparison */}
                              {comparison && (
                                <div className="ri-trend">
                                  <span className="trend-arrow">{comparison.isFaster ? "\u2197" : "\u2198"}</span>
                                  <span className="trend-text">
                                    {comparison.isBest
                                      ? `Personal best! Faster than all ${comparison.comparedTo} similar runs.`
                                      : comparison.isFaster
                                      ? `${Math.abs(comparison.diffPercent)}% faster than your average on ${comparison.comparedTo} similar runs.`
                                      : `${comparison.diffPercent}% slower than your average on ${comparison.comparedTo} similar runs.`
                                    }
                                  </span>
                                </div>
                              )}

                              {/* Split Table */}
                              <div style={{ overflowX: "auto", marginTop: "16px" }}>
                                <table className="split-table">
                                  <thead>
                                    <tr>
                                      <th>Km</th><th>Pace</th><th>Effort*</th><th>Elev</th>
                                      {run.splits[0]?.average_heartrate > 0 && <th>HR</th>}
                                      <th>Status</th>
                                    </tr>
                                  </thead>
                                  <tbody>
                                    {effortData.map((d, i) => {
                                      const rawStr = `${Math.floor(d.rawPace/60)}:${String(Math.round(d.rawPace%60)).padStart(2,"0")}`;
                                      const adjStr = `${Math.floor(d.adjustedPace/60)}:${String(Math.round(d.adjustedPace%60)).padStart(2,"0")}`;
                                      const isFast = d.rawPace < avgRunPace * 0.95;
                                      const isSlow = d.rawPace > avgRunPace * 1.05;
                                      return (
                                        <tr key={i}>
                                          <td style={{ fontWeight: 700 }}>{d.km}</td>
                                          <td style={{ fontWeight: 600 }}>{rawStr}</td>
                                          <td style={{ color: "var(--stone-400)" }}>{adjStr}</td>
                                          <td style={{ color: d.elev > 0 ? "var(--ember)" : d.elev < 0 ? "var(--glacier)" : "var(--stone-400)" }}>
                                            {d.elev > 0 ? "+" : ""}{d.elev}m
                                          </td>
                                          {d.hr > 0 && <td>{Math.round(d.hr)}</td>}
                                          <td>
                                            <span className={`pace-verdict ${isFast ? "too-fast" : isSlow ? "too-slow" : "good"}`}>
                                              {isFast ? "Fast" : isSlow ? "Slow" : "Good"}
                                            </span>
                                          </td>
                                        </tr>
                                      );
                                    })}
                                  </tbody>
                                </table>
                                <div style={{ fontSize: "0.65rem", color: "var(--stone-400)", marginTop: "6px" }}>
                                  * Effort = pace normalized to flat equivalent (Minetti energy cost model)
                                </div>
                              </div>

                              {/* Action Buttons — two playlist modes */}
                              <div style={{ marginTop: "20px" }}>
                                <div style={{ fontSize: "0.72rem", color: "var(--stone-400)", fontWeight: 600, marginBottom: "10px", textTransform: "uppercase", letterSpacing: "0.5px" }}>
                                  What do you want to do with this run?
                                </div>
                                <div style={{ display: "flex", flexDirection: "column", gap: "8px" }}>

                                  {/* Playlist for THIS run (as it happened) */}
                                  <button className="btn-optimize" style={{ width: "100%", display: "flex", alignItems: "center", gap: "12px", padding: "14px 16px", textAlign: "left" }} onClick={() => {
                                    const runDist = run.distance / 1000;
                                    const elevProfile = [0];
                                    run.splits.forEach(sp => { elevProfile.push(elevProfile[elevProfile.length-1] + (sp.elevation_difference || 0)); });
                                    const rerunTrail = {
                                      id: `actual-${run.id}`, name: run.name,
                                      location: "Replay your run", distance: Math.round(runDist * 10) / 10,
                                      elevGain: run.total_elevation_gain || 0, difficulty: "Medium",
                                      profile: elevProfile, type: "trail",
                                    };
                                    // Use actual paces as target (replay mode)
                                    const actualPace = run.moving_time / (run.distance / 1000) / 60;
                                    setSelectedTrail(rerunTrail);
                                    setFlatRunActive(false);
                                    setGpxTrail(null);
                                    setTargetPace(Math.round(actualPace * 10) / 10);
                                    setTargetMode("pace");
                                    setMessage({ type: "info", text: `Generating a playlist that matches your actual run. Scroll down to generate.` });
                                    window.scrollTo({ top: document.body.scrollHeight, behavior: "smooth" });
                                  }}>
                                    <div style={{ fontSize: "1.2rem" }}>&#127925;</div>
                                    <div>
                                      <div style={{ fontWeight: 700, fontSize: "0.85rem" }}>Playlist for this run</div>
                                      <div style={{ fontWeight: 400, fontSize: "0.72rem", opacity: 0.8, marginTop: "2px" }}>Music that matches what you actually did — same pace, same terrain</div>
                                    </div>
                                  </button>

                                  {/* Optimized plan + playlist */}
                                  <button style={{
                                    width: "100%", display: "flex", alignItems: "center", gap: "12px",
                                    padding: "14px 16px", textAlign: "left", borderRadius: "10px",
                                    border: "2px solid var(--ember)", background: "rgba(224,78,42,0.04)",
                                    cursor: "pointer", transition: "all 0.2s", color: "var(--ridge)",
                                  }} onClick={() => {
                                    const runDist = run.distance / 1000;
                                    const elevProfile = [0];
                                    run.splits.forEach(sp => { elevProfile.push(elevProfile[elevProfile.length-1] + (sp.elevation_difference || 0)); });
                                    const rerunTrail = {
                                      id: `optimized-${run.id}`, name: `Optimized: ${run.name}`,
                                      location: "Your ideal version", distance: Math.round(runDist * 10) / 10,
                                      elevGain: run.total_elevation_gain || 0, difficulty: "Medium",
                                      profile: elevProfile, type: "trail",
                                    };
                                    setSelectedTrail(rerunTrail);
                                    setFlatRunActive(false);
                                    setGpxTrail(null);
                                    setMessage({ type: "success", text: `Optimized plan loaded. Your race plan below shows the ideal pacing. Generate a playlist matched to this plan.` });
                                    window.scrollTo({ top: document.body.scrollHeight, behavior: "smooth" });
                                  }}>
                                    <div style={{ fontSize: "1.2rem" }}>&#9889;</div>
                                    <div>
                                      <div style={{ fontWeight: 700, fontSize: "0.85rem", color: "var(--ember)" }}>Optimize &amp; build playlist</div>
                                      <div style={{ fontWeight: 400, fontSize: "0.72rem", color: "var(--stone-500)", marginTop: "2px" }}>Corrected pacing based on your analysis — the run you could have done</div>
                                    </div>
                                  </button>

                                </div>
                              </div>
                            </div>
                          );
                        })()}
                      </div>
                    );
                  })}
                </div>
              )}
            </div>

                  </p>
                  <div style={{ display: "flex", flexDirection: "column", gap: "8px" }}>
                    {[
                      { step: "1", text: "Go to connect.garmin.com and sign in" },
                      { step: "2", text: "Open any running activity" },
                      { step: "3", text: 'Click the gear icon → "Export to TCX"' },
                      { step: "4", text: "Drop the file(s) below" },
                    ].map((item) => (
                      <div key={item.step} style={{ display: "flex", gap: "10px", alignItems: "flex-start" }}>
                        <span style={{
                          minWidth: "22px", height: "22px", borderRadius: "50%",
                          background: "var(--garmin)", color: "white",
                          display: "flex", alignItems: "center", justifyContent: "center",
                          fontSize: "0.7rem", fontWeight: 700,
                        }}>{item.step}</span>
                        <span style={{ fontSize: "0.78rem", color: "var(--stone-500)", lineHeight: 1.4, paddingTop: "2px" }}>{item.text}</span>
                      </div>
                    ))}
                  </div>
                </div>

                <div style={{
                  border: "2px dashed var(--stone-200)", borderRadius: "12px",
                  padding: "24px", textAlign: "center", cursor: "pointer",
                  transition: "all 0.2s",
                  background: garminDragOver ? "rgba(0,124,195,0.04)" : "transparent",
                  borderColor: garminDragOver ? "var(--garmin)" : "var(--stone-200)",
                }}
                onClick={() => document.getElementById("garmin-modal-file-input").click()}
                onDragOver={(e) => { e.preventDefault(); setGarminDragOver(true); }}
                onDragLeave={() => setGarminDragOver(false)}
                onDrop={(e) => {
                  e.preventDefault(); setGarminDragOver(false);
                  const files = Array.from(e.dataTransfer.files).filter(f => f.name.match(/\.(tcx|gpx|fit)$/i));
                  if (files.length > 0) {
                    handleTCXFiles(files);
                    setImportSources(prev => [...new Set([...prev, "garmin"])]);
                    setGarminConnected(true);
                    setShowGarminModal(false);
                  }
                }}
                >
                  <input id="garmin-modal-file-input" type="file" accept=".tcx,.gpx,.fit" multiple style={{ display: "none" }}
                    onChange={(e) => {
                      const files = Array.from(e.target.files);
                      if (files.length > 0) {
                        handleTCXFiles(files);
                        setImportSources(prev => [...new Set([...prev, "garmin"])]);
                        setGarminConnected(true);
                        setShowGarminModal(false);
                      }
                      e.target.value = "";
                    }}
                  />
                  <div style={{ fontSize: "1.8rem", marginBottom: "8px" }}>⌚</div>
                  <p style={{ margin: 0, fontSize: "0.85rem", fontWeight: 600, color: "var(--stone-500)" }}>
                    Drop Garmin activity files here
                  </p>
                  <p style={{ margin: "6px 0 0 0", fontSize: "0.72rem", color: "var(--stone-400)" }}>
                    Supports .TCX, .GPX, and .FIT files
                  </p>
                </div>

                <div style={{ display: "flex", gap: "8px", flexWrap: "wrap", marginTop: "12px", justifyContent: "center" }}>
                  <span style={{ fontSize: "0.7rem", padding: "3px 8px", borderRadius: "20px", background: "rgba(0,124,195,0.08)", color: "var(--garmin)" }}>GPS data</span>
                  <span style={{ fontSize: "0.7rem", padding: "3px 8px", borderRadius: "20px", background: "rgba(0,124,195,0.08)", color: "var(--garmin)" }}>Heart rate</span>
                  <span style={{ fontSize: "0.7rem", padding: "3px 8px", borderRadius: "20px", background: "rgba(0,124,195,0.08)", color: "var(--garmin)" }}>Cadence</span>
                  <span style={{ fontSize: "0.7rem", padding: "3px 8px", borderRadius: "20px", background: "rgba(0,124,195,0.08)", color: "var(--garmin)" }}>Elevation</span>
                </div>
              </div>
            </div>
          )}

        </div>
      );
    }

    // ============ ERROR BOUNDARY ============
    class ErrorBoundary extends React.Component {
      constructor(props) {
        super(props);
        this.state = { hasError: false, error: null };
      }

      static getDerivedStateFromError(error) {
        return { hasError: true, error };
      }

      componentDidCatch(error, errorInfo) {
        console.error("Error caught:", error, errorInfo);
      }

      render() {
        if (this.state.hasError) {
          return (
            <div className="container" style={{ paddingTop: "40px" }}>
              <div className="message message-error">
                <strong>Something went wrong:</strong> {this.state.error?.message}
              </div>
            </div>
          );
        }

        return this.props.children;
      }
    }

    // ============ RENDER ============
    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(React.createElement(ErrorBoundary, null, React.createElement(CantoApp)));
  </script>
</body>
</html>
